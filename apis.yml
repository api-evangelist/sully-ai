aid: sully-ai
name: Sully AI
description: >-
  Sully AI is a US-based healthcare AI company that ships a portfolio of
  "AI employees" for clinical and administrative work — including an AI
  Scribe that turns patient conversations into structured, HIPAA-compliant
  notes, an AI Receptionist for scheduling and front desk, an AI Triage
  Nurse for patient engagement, an AI Medical Coder for autonomous ICD-10
  coding, an AI Pharmacist, and an AI Consultant for chart prep. The
  platform integrates with Epic, Cerner, MEDITECH, Athenahealth,
  Allscripts, Veradigm, and 50+ other EHRs. Beyond the end-user products,
  Sully exposes a public REST API covering audio transcription (file
  upload and real-time WebSocket streaming), clinical note generation
  (SOAP and custom templates), medical coding extraction (ICD-10, CPT,
  SNOMED), note templates, and a medical consensus alpha feature, with
  asynchronous results delivered over webhooks. Official Apache-2.0
  licensed TypeScript/Node and Python SDKs are published under the
  sullyai GitHub org, and an Odiggo-maintained sully-api-demo repo
  showcases end-to-end usage. Sully's revenue model is SaaS subscriptions
  to healthcare providers, hospitals, and digital health platforms.
